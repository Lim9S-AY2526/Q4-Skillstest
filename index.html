<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q4 Seatwork 1</title>

    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background-color: #ffe6f2;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h3>Account Login</h3>

        <details ontoggle="alert('TEST CREDENTIALS: \nUser: UserAdmin \nPass: admin123')">
            <summary class="btn btn-sm btn-outline-secondary mb-3">View Login Help</summary>
            <p class="small text-muted">Enter the credentials shown in the alert box.</p>
        </details>

        <form>
            <label for="username" class="form-label">Username:</label>
            <input type="text" class="form-control" id="username">

            <label for="password" class="form-label mt-2">Password:</label>
            <input type="password" class="form-control" id="password">

            <div id="feedback" class="mt-3 fw-bold"></div>

            <br>
            <button type="button" class="btn btn-primary w-100" onclick="loginNow()">Login</button>
        </form>
    </div>

    <script src="main.js"></script>

</body>
</html>
